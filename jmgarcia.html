  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #1a1a1a;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .card-wrap {
      width: min(400px, 92vw);
      aspect-ratio: 372.03 / 250;
      perspective: 1400px;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: flipCard 2s cubic-bezier(0.4,0,0.2,1) 0.8s forwards;
      cursor: pointer;
    }

    @keyframes flipCard {
      0%   { transform: rotateY(0deg); }
      100% { transform: rotateY(180deg); }
    }

    .face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .front svg { width: 100%; height: 100%; display: block; }

    .back { transform: rotateY(180deg); position: relative; }

    .back-svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    .back-content {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      padding-left: 26%;
      padding-right: 2%;
    }

    .inner {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      width: 100%;
    }

    .contact-name {
      font-family: 'Cabin', sans-serif;
      font-weight: 700;
      font-size: clamp(12px, 3.5vw, 15px);
      color: #1a2e3a;
      line-height: 1.2;
      margin-bottom: 3px;
    }

    .contact-role {
      font-family: 'Cabin', sans-serif;
      font-weight: 600;
      font-size: clamp(7px, 1.8vw, 8.5px);
      color: #8a9ea8;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .divider {
      width: 24px;
      height: 0.5px;
      background: #c8d4d9;
      margin-bottom: 5px;
    }

    .contact-links {
      display: flex;
      flex-direction: column;
      gap: 3px;
      width: 100%;
    }

    .contact-link {
      font-family: 'Inter', sans-serif;
      font-size: clamp(8px, 2vw, 10px);
      font-weight: 500;
      color: #314a57;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .link-icon {
      width: clamp(15px, 3.8vw, 17px);
      height: clamp(15px, 3.8vw, 17px);
      min-width: 15px;
      border-radius: 50%;
      background: #314a57;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg { width: 45%; height: 45%; fill: #fff; }

    .addr {
      font-size: clamp(7px, 1.7vw, 9px);
      color: #5a7a89;
    }

    .btn-save {
      font-family: 'Cabin', sans-serif;
      margin-top: 7px;
      background: #314a57;
      color: #fff;
      border: none;
      padding: 6px 16px;
      font-size: clamp(7px, 1.8vw, 8.5px);
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      border-radius: 20px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    .hint {
      margin-top: 1rem;
      font-size: 11px;
      color: #555;
      letter-spacing: 0.3px;
    }
  </style>
