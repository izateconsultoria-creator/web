<main>
<section class="hero animate fade-up">
    <video autoplay muted loop playsinline>
        <source src="https://res.cloudinary.com/dxsip0hvb/video/upload/v1768601887/3188-166339073_uu60qf.mp4" type="video/mp4">
    </video>

    <div class="hero-content">
        <button id="openModal" class="cta-button animate from-bottom">
            Cuéntanos tu caso
        </button>
    </div>
</section>

<div id="contactModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeModal">&times;</span>
        <h2>Contacto</h2>

        <form id="contactForm" class="main-form">
            <input type="text" name="nombre" placeholder="Nombre completo" required>
            <input type="email" name="email" placeholder="Correo electrónico" required>

            <select name="tipo_consulta" required>
                <option value="" disabled selected>Tipo de consulta</option>
                <option value="juridica">Duda Jurídica</option>
                <option value="tecnica">Duda Técnica</option>
                <option value="360">Consultoría 360 (Ambas)</option>
            </select>

            <textarea name="mensaje" placeholder="Describe tu caso o consulta" rows="5" required></textarea>
            <button type="submit" class="submit-btn">ENVIAR</button>
        </form>

        <div id="formSuccess" class="form-success">
            <h3>¡Consulta enviada!</h3>
            <p>Gracias por contactarnos. Te responderemos lo antes posible.</p>
        </div>
    </div>
</div>
</main>
